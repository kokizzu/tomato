name: 'tomato-run'
description: 'Run behavioral tests with Tomato'
author: 'tomatool'
branding:
  icon: 'check-circle'
  color: 'red'

inputs:
  version:
    description: 'Tomato version to use (e.g., "v1.0.0"). Defaults to the action version tag.'
    required: false
    default: ''
  config:
    description: 'Config file path'
    required: false
    default: 'tomato.yml'
  features:
    description: 'Feature files or directories to run'
    required: false
    default: ''
  tags:
    description: 'Filter scenarios by tags (e.g., "@smoke and not @slow")'
    required: false
    default: ''
  scenario:
    description: 'Filter scenarios by name (regex pattern)'
    required: false
    default: ''
  no-reset:
    description: 'Skip state reset between scenarios (for debugging)'
    required: false
    default: 'false'
  verbose:
    description: 'Verbose output (show debug logs)'
    required: false
    default: 'false'
  quiet:
    description: 'Hide application logs during startup'
    required: false
    default: 'false'
  skip-validate:
    description: 'Skip configuration validation before running tests'
    required: false
    default: 'false'
  comment:
    description: 'Post/update a test summary comment on the PR'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install Tomato
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"

        # Determine OS and architecture
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        # If no version specified, use the action's tag or latest
        if [ -z "$VERSION" ]; then
          ACTION_REF="${{ github.action_ref }}"

          # Check if it's a full version tag (e.g., v2.0.0)
          if [[ "$ACTION_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="$ACTION_REF"
          # Check if it's a major version tag (e.g., v2) - get latest of that major
          elif [[ "$ACTION_REF" =~ ^v([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            VERSION=$(curl -s https://api.github.com/repos/tomatool/tomato/releases | grep '"tag_name"' | grep "\"v${MAJOR}\." | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            if [ -z "$VERSION" ]; then
              # Fallback to latest if no matching major version found
              VERSION=$(curl -s https://api.github.com/repos/tomatool/tomato/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
            fi
          else
            # Fallback to latest release
            VERSION=$(curl -s https://api.github.com/repos/tomatool/tomato/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          fi
        fi

        # Remove 'v' prefix if present for download URL
        VERSION_NUM=${VERSION#v}

        echo "Installing Tomato ${VERSION} for ${OS}/${ARCH}"

        # Download and install
        DOWNLOAD_URL="https://github.com/tomatool/tomato/releases/download/${VERSION}/tomato_${VERSION_NUM}_${OS}_${ARCH}.tar.gz"
        echo "Downloading from: ${DOWNLOAD_URL}"

        curl -sL "$DOWNLOAD_URL" -o tomato.tar.gz
        tar -xzf tomato.tar.gz
        chmod +x tomato
        sudo mv tomato /usr/local/bin/
        rm tomato.tar.gz

        echo "Tomato installed successfully"
        tomato version

    - name: Validate Configuration
      if: inputs.skip-validate != 'true'
      shell: bash
      run: |
        CONFIG="${{ inputs.config }}"
        echo "Validating configuration: ${CONFIG}"
        tomato validate --config "${CONFIG}" --plain

    - name: Run Tomato Tests
      shell: bash
      run: |
        ARGS="run"

        # Config file
        if [ -n "${{ inputs.config }}" ]; then
          ARGS="$ARGS --config ${{ inputs.config }}"
        fi

        # Tags filter
        if [ -n "${{ inputs.tags }}" ]; then
          ARGS="$ARGS --tags '${{ inputs.tags }}'"
        fi

        # Scenario filter
        if [ -n "${{ inputs.scenario }}" ]; then
          ARGS="$ARGS --scenario '${{ inputs.scenario }}'"
        fi

        # No reset flag
        if [ "${{ inputs.no-reset }}" = "true" ]; then
          ARGS="$ARGS --no-reset"
        fi

        # Verbose flag
        if [ "${{ inputs.verbose }}" = "true" ]; then
          ARGS="$ARGS --verbose"
        fi

        # Quiet flag
        if [ "${{ inputs.quiet }}" = "true" ]; then
          ARGS="$ARGS --quiet"
        fi

        # Force tomato format when comment is enabled
        if [ "${{ inputs.comment }}" = "true" ]; then
          ARGS="$ARGS --format tomato"
        fi

        # Feature files
        if [ -n "${{ inputs.features }}" ]; then
          ARGS="$ARGS ${{ inputs.features }}"
        fi

        echo "Running: tomato $ARGS"

        if [ "${{ inputs.comment }}" = "true" ]; then
          set +e
          eval "tomato $ARGS" 2>&1 | tee .tomato-output.log
          TOMATO_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "$TOMATO_EXIT_CODE" > .tomato-exit-code
        else
          eval "tomato $ARGS"
        fi

    - name: Parse Test Results
      if: inputs.comment == 'true' && always()
      id: parse-results
      shell: bash
      run: |
        TOTAL=0
        PASSED=0
        FAILED=0
        SKIPPED=0
        STATUS="success"
        DETAILS=""

        if [ -f .tomato-output.log ]; then
          while IFS= read -r line; do
            # Strip the TOMATO_EVENT: prefix
            json="${line#TOMATO_EVENT:}"

            event_type=$(echo "$json" | jq -r '.type // empty' 2>/dev/null)

            if [ "$event_type" = "summary" ]; then
              TOTAL=$(echo "$json" | jq -r '.total // 0')
              PASSED=$(echo "$json" | jq -r '.passed // 0')
              FAILED=$(echo "$json" | jq -r '.failed // 0')
              SKIPPED=$(echo "$json" | jq -r '.skipped // 0')
            fi

            if [ "$event_type" = "scenario_end" ]; then
              scenario_status=$(echo "$json" | jq -r '.status // empty')
              if [ "$scenario_status" = "failed" ]; then
                feature=$(echo "$json" | jq -r '.feature // "Unknown"')
                scenario=$(echo "$json" | jq -r '.scenario // "Unknown"')
                error=$(echo "$json" | jq -r '.error // "No error message"')
                DETAILS="${DETAILS}\n**Feature: ${feature}** — \`Scenario: ${scenario}\`\n> ${error}\n"
              fi
            fi
          done < <(grep '^TOMATO_EVENT:' .tomato-output.log)
        fi

        if [ "$FAILED" -gt 0 ]; then
          STATUS="failure"
        fi

        echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
        echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
        echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
        echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"

        # Use a delimiter for multi-line output
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "details<<$EOF" >> "$GITHUB_OUTPUT"
        echo -e "$DETAILS" >> "$GITHUB_OUTPUT"
        echo "$EOF" >> "$GITHUB_OUTPUT"

    - name: Write Job Summary
      if: inputs.comment == 'true' && always()
      shell: bash
      run: |
        TOTAL="${{ steps.parse-results.outputs.total }}"
        PASSED="${{ steps.parse-results.outputs.passed }}"
        FAILED="${{ steps.parse-results.outputs.failed }}"
        SKIPPED="${{ steps.parse-results.outputs.skipped }}"
        STATUS="${{ steps.parse-results.outputs.status }}"
        DETAILS="${{ steps.parse-results.outputs.details }}"

        if [ "$STATUS" = "success" ]; then
          EMOJI="✅"
        else
          EMOJI="❌"
        fi

        echo "## 🍅 Tomato Test Results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "${EMOJI} **${TOTAL} scenarios** (${PASSED} passed, ${FAILED} failed, ${SKIPPED} skipped)" >> "$GITHUB_STEP_SUMMARY"

        if [ -n "$DETAILS" ]; then
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details>" >> "$GITHUB_STEP_SUMMARY"
          echo "<summary>Failed Scenarios</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo -e "$DETAILS" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
        fi

        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "---" >> "$GITHUB_STEP_SUMMARY"
        echo "*Generated by [tomato](https://github.com/tomatool/tomato)*" >> "$GITHUB_STEP_SUMMARY"

    - name: Post PR Comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const total = '${{ steps.parse-results.outputs.total }}';
          const passed = '${{ steps.parse-results.outputs.passed }}';
          const failed = '${{ steps.parse-results.outputs.failed }}';
          const skipped = '${{ steps.parse-results.outputs.skipped }}';
          const status = '${{ steps.parse-results.outputs.status }}';
          const details = `${{ steps.parse-results.outputs.details }}`.trim();

          const emoji = status === 'success' ? '✅' : '❌';
          const marker = '<!-- tomato-test-results -->';

          let body = `${marker}\n## 🍅 Tomato Test Results\n\n`;
          body += `${emoji} **${total} scenarios** (${passed} passed, ${failed} failed, ${skipped} skipped)\n`;

          if (details) {
            body += `\n<details>\n<summary>Failed Scenarios</summary>\n\n${details}\n</details>\n`;
          }

          body += `\n---\n*Generated by [tomato](https://github.com/tomatool/tomato)*`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Exit with test result
      if: inputs.comment == 'true' && always()
      shell: bash
      run: |
        if [ -f .tomato-exit-code ]; then
          exit $(cat .tomato-exit-code)
        fi
