name: 'tomato-run'
description: 'Run behavioral tests with Tomato'
author: 'tomatool'
branding:
  icon: 'check-circle'
  color: 'red'

inputs:
  version:
    description: 'Tomato version to use (e.g., "v1.0.0"). Defaults to the action version tag.'
    required: false
    default: ''
  config:
    description: 'Config file path'
    required: false
    default: 'tomato.yml'
  features:
    description: 'Feature files or directories to run'
    required: false
    default: ''
  tags:
    description: 'Filter scenarios by tags (e.g., "@smoke and not @slow")'
    required: false
    default: ''
  scenario:
    description: 'Filter scenarios by name (regex pattern)'
    required: false
    default: ''
  no-reset:
    description: 'Skip state reset between scenarios (for debugging)'
    required: false
    default: 'false'
  verbose:
    description: 'Verbose output (show debug logs)'
    required: false
    default: 'false'
  quiet:
    description: 'Hide application logs during startup'
    required: false
    default: 'false'
  skip-validate:
    description: 'Skip configuration validation before running tests'
    required: false
    default: 'false'
  comment:
    description: 'Post/update a test summary comment on the PR'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install Tomato
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"

        # Determine OS and architecture
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        # If no version specified, use the action's tag or latest
        if [ -z "$VERSION" ]; then
          ACTION_REF="${{ github.action_ref }}"

          # Check if it's a full version tag (e.g., v2.0.0)
          if [[ "$ACTION_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="$ACTION_REF"
          # Check if it's a major version tag (e.g., v2) - get latest of that major
          elif [[ "$ACTION_REF" =~ ^v([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            VERSION=$(curl -s https://api.github.com/repos/tomatool/tomato/releases | grep '"tag_name"' | grep "\"v${MAJOR}\." | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            if [ -z "$VERSION" ]; then
              # Fallback to latest if no matching major version found
              VERSION=$(curl -s https://api.github.com/repos/tomatool/tomato/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
            fi
          else
            # Fallback to latest release
            VERSION=$(curl -s https://api.github.com/repos/tomatool/tomato/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          fi
        fi

        # Remove 'v' prefix if present for download URL
        VERSION_NUM=${VERSION#v}

        echo "Installing Tomato ${VERSION} for ${OS}/${ARCH}"

        # Download and install
        DOWNLOAD_URL="https://github.com/tomatool/tomato/releases/download/${VERSION}/tomato_${VERSION_NUM}_${OS}_${ARCH}.tar.gz"
        echo "Downloading from: ${DOWNLOAD_URL}"

        curl -sL "$DOWNLOAD_URL" -o tomato.tar.gz
        tar -xzf tomato.tar.gz
        chmod +x tomato
        sudo mv tomato /usr/local/bin/
        rm tomato.tar.gz

        echo "Tomato installed successfully"
        tomato version

    - name: Validate Configuration
      if: inputs.skip-validate != 'true'
      shell: bash
      run: |
        CONFIG="${{ inputs.config }}"
        echo "Validating configuration: ${CONFIG}"
        tomato validate --config "${CONFIG}" --plain

    - name: Run Tomato Tests
      shell: bash
      run: |
        ARGS="run"

        # Config file
        if [ -n "${{ inputs.config }}" ]; then
          ARGS="$ARGS --config ${{ inputs.config }}"
        fi

        # Tags filter
        if [ -n "${{ inputs.tags }}" ]; then
          ARGS="$ARGS --tags '${{ inputs.tags }}'"
        fi

        # Scenario filter
        if [ -n "${{ inputs.scenario }}" ]; then
          ARGS="$ARGS --scenario '${{ inputs.scenario }}'"
        fi

        # No reset flag
        if [ "${{ inputs.no-reset }}" = "true" ]; then
          ARGS="$ARGS --no-reset"
        fi

        # Verbose flag
        if [ "${{ inputs.verbose }}" = "true" ]; then
          ARGS="$ARGS --verbose"
        fi

        # Quiet flag
        if [ "${{ inputs.quiet }}" = "true" ]; then
          ARGS="$ARGS --quiet"
        fi

        # Force tomato format when comment is enabled
        if [ "${{ inputs.comment }}" = "true" ]; then
          ARGS="$ARGS --format tomato"
        fi

        # Feature files
        if [ -n "${{ inputs.features }}" ]; then
          ARGS="$ARGS ${{ inputs.features }}"
        fi

        echo "Running: tomato $ARGS"

        if [ "${{ inputs.comment }}" = "true" ]; then
          START_TIME=$(date +%s)
          set +e
          eval "tomato $ARGS" 2>&1 | tee .tomato-output.log
          TOMATO_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          DURATION=$(( $(date +%s) - START_TIME ))
          echo "$TOMATO_EXIT_CODE" > .tomato-exit-code
          echo "$DURATION" > .tomato-duration
        else
          eval "tomato $ARGS"
        fi

    - name: Parse Test Results
      if: inputs.comment == 'true' && always()
      id: parse-results
      shell: bash
      run: |
        TOTAL=0
        PASSED=0
        FAILED=0
        SKIPPED=0
        STATUS="success"
        DETAILS=""
        FEATURES=0
        STEPS_PASSED=0
        STEPS_FAILED=0
        STEPS_SKIPPED=0
        SCENARIOS=""

        if [ -f .tomato-output.log ]; then
          while IFS= read -r line; do
            json="${line#TOMATO_EVENT:}"
            event_type=$(echo "$json" | jq -r '.type // empty' 2>/dev/null)

            case "$event_type" in
              summary)
                TOTAL=$(echo "$json" | jq -r '.total // 0')
                PASSED=$(echo "$json" | jq -r '.passed // 0')
                FAILED=$(echo "$json" | jq -r '.failed // 0')
                SKIPPED=$(echo "$json" | jq -r '.skipped // 0')
                ;;
              feature_start)
                FEATURES=$((FEATURES + 1))
                ;;
              scenario_end)
                feature=$(echo "$json" | jq -r '.feature // "Unknown"')
                scenario=$(echo "$json" | jq -r '.scenario // "Unknown"')
                scenario_status=$(echo "$json" | jq -r '.status // empty')
                if [ "$scenario_status" = "failed" ]; then
                  error=$(echo "$json" | jq -r '.error // "No error message"')
                  DETAILS="${DETAILS}\nâťŚ **${feature}** â€” \`${scenario}\`\n> ${error}\n"
                  SCENARIOS="${SCENARIOS}| âťŚ | ${feature} | ${scenario} |\n"
                elif [ "$scenario_status" = "passed" ]; then
                  SCENARIOS="${SCENARIOS}| âś… | ${feature} | ${scenario} |\n"
                else
                  SCENARIOS="${SCENARIOS}| âŹ­ď¸Ź | ${feature} | ${scenario} |\n"
                fi
                ;;
              step_end)
                step_status=$(echo "$json" | jq -r '.status // empty')
                case "$step_status" in
                  passed) STEPS_PASSED=$((STEPS_PASSED + 1)) ;;
                  failed|undefined|ambiguous) STEPS_FAILED=$((STEPS_FAILED + 1)) ;;
                  skipped|pending) STEPS_SKIPPED=$((STEPS_SKIPPED + 1)) ;;
                esac
                ;;
            esac
          done < <(grep '^TOMATO_EVENT:' .tomato-output.log)
        fi

        if [ "$FAILED" -gt 0 ]; then
          STATUS="failure"
        fi

        # Read duration
        DURATION="0"
        if [ -f .tomato-duration ]; then
          DURATION=$(cat .tomato-duration)
        fi

        echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
        echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
        echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
        echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"
        echo "features=$FEATURES" >> "$GITHUB_OUTPUT"
        echo "steps_passed=$STEPS_PASSED" >> "$GITHUB_OUTPUT"
        echo "steps_failed=$STEPS_FAILED" >> "$GITHUB_OUTPUT"
        echo "steps_skipped=$STEPS_SKIPPED" >> "$GITHUB_OUTPUT"
        echo "duration=$DURATION" >> "$GITHUB_OUTPUT"

        # Use delimiters for multi-line outputs
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "details<<$EOF" >> "$GITHUB_OUTPUT"
        echo -e "$DETAILS" >> "$GITHUB_OUTPUT"
        echo "$EOF" >> "$GITHUB_OUTPUT"

        EOF2=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "scenarios<<$EOF2" >> "$GITHUB_OUTPUT"
        echo -e "$SCENARIOS" >> "$GITHUB_OUTPUT"
        echo "$EOF2" >> "$GITHUB_OUTPUT"

    - name: Build Comment Body
      if: inputs.comment == 'true' && always()
      id: build-comment
      uses: actions/github-script@v7
      with:
        script: |
          const total = parseInt('${{ steps.parse-results.outputs.total }}') || 0;
          const passed = parseInt('${{ steps.parse-results.outputs.passed }}') || 0;
          const failed = parseInt('${{ steps.parse-results.outputs.failed }}') || 0;
          const skipped = parseInt('${{ steps.parse-results.outputs.skipped }}') || 0;
          const features = parseInt('${{ steps.parse-results.outputs.features }}') || 0;
          const stepsPassed = parseInt('${{ steps.parse-results.outputs.steps_passed }}') || 0;
          const stepsFailed = parseInt('${{ steps.parse-results.outputs.steps_failed }}') || 0;
          const stepsSkipped = parseInt('${{ steps.parse-results.outputs.steps_skipped }}') || 0;
          const duration = parseInt('${{ steps.parse-results.outputs.duration }}') || 0;
          const status = '${{ steps.parse-results.outputs.status }}';
          const details = `${{ steps.parse-results.outputs.details }}`.trim();
          const scenarios = `${{ steps.parse-results.outputs.scenarios }}`.trim();

          const emoji = status === 'success' ? 'âś…' : 'âťŚ';
          const mins = Math.floor(duration / 60);
          const secs = duration % 60;
          const durationStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
          const totalSteps = stepsPassed + stepsFailed + stepsSkipped;

          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

          let body = `## đźŤ… Tomato Test Results\n\n`;
          body += `${emoji} **${total} scenarios** across ${features} feature${features !== 1 ? 's' : ''} in **${durationStr}**\n\n`;
          body += `| Scenarios | Steps |\n`;
          body += `|-----------|-------|\n`;
          body += `| âś… ${passed} passed | âś… ${stepsPassed} passed |\n`;

          if (failed > 0 || stepsFailed > 0) {
            body += `| âťŚ ${failed} failed | âťŚ ${stepsFailed} failed |\n`;
          }
          if (skipped > 0 || stepsSkipped > 0) {
            body += `| âŹ­ď¸Ź ${skipped} skipped | âŹ­ď¸Ź ${stepsSkipped} skipped |\n`;
          }

          if (details) {
            body += `\n<details>\n<summary>âťŚ Failed Scenarios</summary>\n\n${details}\n</details>\n`;
          }

          if (scenarios) {
            body += `\n<details>\n<summary>đź“‹ All Scenarios</summary>\n\n`;
            body += `| | Feature | Scenario |\n|---|---------|----------|\n`;
            body += `${scenarios}\n</details>\n`;
          }

          body += `\n[View workflow run](${runUrl}) Â· *Generated by [tomato](https://github.com/tomatool/tomato)*`;

          core.setOutput('body', body);

    - name: Write Job Summary
      if: inputs.comment == 'true' && always()
      shell: bash
      run: |
        cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
        ${{ steps.build-comment.outputs.body }}
        EOF

    - name: Post PR Comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const marker = '<!-- tomato-test-results -->';
          const body = marker + '\n' + `${{ steps.build-comment.outputs.body }}`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Exit with test result
      if: inputs.comment == 'true' && always()
      shell: bash
      run: |
        if [ -f .tomato-exit-code ]; then
          exit $(cat .tomato-exit-code)
        fi
